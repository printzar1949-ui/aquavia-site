
name: Deploy AquaVia

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Upload site
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./

    - name: Deploy
      uses: actions/deploy-pages@v4
