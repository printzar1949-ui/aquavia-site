<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aviation Safety Card</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1220;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}.card{ width:320px; border-radius:20px; overflow:hidden; background:#111a2e; box-shadow:0 10px 30px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); }

.card img{ width:100%; height:180px; object-fit:cover; display:block; }

.content{ padding:18px; }

.title{ font-size:18px; font-weight:bold; color:#7dd3fc; margin-bottom:8px; }

.subtitle{ font-size:13px; color:#cbd5e1; line-height:1.4; }

.tag{ margin-top:12px; display:inline-block; font-size:12px; padding:6px 10px; border-radius:999px; background:#0ea5e9; color:white; } </style>

</head>
<body><div class="card">
  <img src="hero.jpg" alt="Aviation Safety" />
  <div class="content">
    <div class="title">Aviation Safety</div>
    <div class="subtitle">Future Aircraft Protection and Emergency Safety Systems</div>
    <div class="tag">Innovation Concept</div>
  </div>
</div></body>
</html>
