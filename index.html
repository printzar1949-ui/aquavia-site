<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أكوافيا</title>

<style>
<script>

const images = [

"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80",

"https://images.unsplash.com/photo-1497436072909-f5e4be8fba81?auto=format&fit=crop&w=1400&q=80",

"https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=1400&q=80",

"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80"

];

let index = 0;

setInterval(() => {

index++;

if(index >= images.length){
index = 0;
}

document.getElementById("slider").src = images[index];

}, 4000);

</script>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#021421,#00334e,#001018);
    color:white;
    text-align:center;
}

/* القسم الرئيسي */

.hero{
    padding:100px 20px;
}

.hero h1{
    font-size:50px;
    color:#00d9ff;
    text-shadow:0 0 20px cyan;
}

.hero p{
    font-size:24px;
    opacity:0.9;
}

/* الصورة */

.<img id="slider" 
src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80"
alt="AquaVia"
class="hero-image">

    border-radius:24px;

    display:block;

    margin-left:auto;
    margin-right:auto;

    box-shadow:
    0 0 40px rgba(0,255,255,0.4),
    0 20px 60px rgba(0,0,0,0.6);

    animation:floatImage 5s ease-in-out infinite;
}

@keyframes floatImage{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* الأزرار */

.buttons{
    margin-top:40px;
}

.btn{
    display:inline-block;

    margin:10px;

    padding:14px 28px;

    border-radius:14px;

    background:#00bcd4;

    color:white;

    text-decoration:none;

    font-size:20px;

    transition:0.3s;

    box-shadow:
    0 0 20px rgba(0,255,255,0.5);
}

.btn:hover{
    transform:scale(1.08);
    background:#00e5ff;
}

/* قسم المخترع */

.inventor{
    margin:60px auto;

    width:85%;
    max-width:900px;

    padding:30px;

    background:rgba(255,255,255,0.05);

    border-radius:20px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(0,255,255,0.15);
}

.inventor h2{
    color:#00e5ff;
    font-size:32px;
}

.inventor p{
    font-size:20px;
    line-height:1.8;
}

/* التذييل */

footer{
    margin-top:60px;
    padding:20px;
    background:#000c14;
}

</style>

</head>

<body>

<section class="hero">

<h1>
أكوافيا للابتكارات العالمية
</h1>

<p>
مستقبل المياه الجوية والتقنيات المستدامة
</p>


<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1400&q=80" alt="AquaVia" class="hero-image">
<div class="buttons">

<a href="#about" class="btn">
عن المشروع
</a>

<a href="#projects" class="btn">
المشاريع
</a>

<a href="https://github.com/printzar1949-ui/aquavia-site" target="_blank" class="btn">
💻 شفرة المصدر
</a>

</div>

</section>

<section class="inventor">

<h2>
مخترع ومطور ابتكارات
</h2>

<p>
نزار بشير جديد مخترع مستقل يركز على
التقنيات البيئية المستدامة وتقنيات المستقبل.
</p>

</section>

<footer>

Nezar Bachir Jdid © AquaVia

</footer>

</body>
</html>
