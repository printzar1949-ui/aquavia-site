
<!DOCTYPE html>

}

/* الصورة */
.hero img {
  width: 100%;
  height: 80vh;

}

  height: 80vh;
  background: rgba(0,0,0,0.5);
hero-text h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

.hero-text p {
  font-size: 18px;
  margin-bottom: 15px;
}

.hero-text {
  color: white;
  text-shadow: 0 5px 20px rgba(0,0,0,0.9);
  width: 90%;
}

/* زر */
.btn {
  padding: 12px 24px;
  background: #00d4ff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 15px;
}
</style>
</head>

<body>

<section class="hero">

  <img src="https://printzar1949-ui.github.io/aquavia-site/aquavia-hero.png.jpg">

  <div class="hero-text">
