<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AquaVia</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1d2a;
    color:white;
    text-align:center;
  }

  .title{
    font-size:42px;
    margin-top:40px;
    font-weight:bold;
  }

  .image{
    margin:30px auto;
  }

  .image img{
    max-width:360px;
    width:85%;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }

  .text{
    font-size:18px;
    max-width:700px;
    margin:20px auto;
    opacity:0.9;
    line-height:1.6;
  }

  .invest{
    margin-top:40px;
    font-size:24px;
    font-weight:bold;
    color:#00d4ff;
  }

  .button{
    display:inline-block;
    margin-top:20px;
    padding:12px 28px;
    background:#00d4ff;
    color:#000;
    font-weight:bold;
    border-radius:8px;
    text-decoration:none;
  }

  .stats{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:40px;
    flex-wrap:wrap;
  }

  .box{
    background:rgba(255,255,255,0.08);
    padding:15px 20px;
    border-radius:12px;
    min-width:120px;
  }
</style>
</head>

<body>

<div class="title">AquaVia</div>

<div class="image">
  <img src="aquavia.jpg" alt="AquaVia">
</div>

<div class="text">
Turning Air into Clean Drinking Water using advanced sustainable atmospheric technology.
</div>

<div class="stats">
  <div class="box">24/7 Water</div>
  <div class="box">Zero Waste</div>
  <div class="box">Scalable Tech</div>
</div>

<div class="invest">Become an Investor</div>

<a class="button" href="#">Invest Now</a>

</body>
</html>
