<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>AquaVia BMI Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">

            <label>الطول (سم):</label>
            <input id="txbHeight" class="form-control" placeholder="أدخل الطول">

            <label class="mt-2">الوزن (كغ):</label>
            <input id="txbWeight" class="form-control" placeholder="أدخل الوزن">

            <br>

            <button class="btn btn-primary" id="ButtonCal">احسب BMI</button>

        </div>
    </div>
</div>

<script>
$(function () {
    $('#ButtonCal').click(function () {

        var height = parseFloat($('#txbHeight').val()) / 100;
        var weight = parseFloat($('#txbWeight').val());

        if (!height || !weight) {
            alert("الرجاء إدخال القيم بشكل صحيح");
            return;
        }

        var bmi = weight / (height * height);

        alert("مؤشر كتلة الجسم (BMI): " + bmi.toFixed(2));
    });
});
</script>

</body>
</html>
