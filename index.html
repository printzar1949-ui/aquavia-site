<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaVia</title>

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* HERO */
.hero {
  height: 100vh;
  background-image: url("https://printzar1949-ui.github.io/aquavia-site/hero.jpg");
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* DARK OVERLAY */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
}

/* TEXT */
.hero-text {
  position: relative;
  z-index: 2;
  color: white;
  text-align: center;
  max-width: 700px;
  padding: 20px;
}

.hero-text h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.hero-text p {
  font-size: 18px;
  opacity: 0.9;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: #00c2ff;
  color: black;
  text-decoration: none;
  border-radius: 6px;
  display: inline-block;
  font-weight: bold;
}

/* SECTIONS */
.section {
  padding: 60px 20px;
  text-align: center;
}

.grid {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #11182a;
  padding: 20px;
  border-radius: 10px;
  min-width: 220px;
  color: white;
}
</style>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>AquaVia</h1>
    <p>Turning Air into Clean Water – 24/7 Sustainable Innovation</p>
    <a href="#" class="btn">Invest Now</a>
  </div>
</section>

<!-- SECTION -->
<section class="section">
  <h2>Key Impact Metrics</h2>
  <div class="grid">
    <div class="card">100% Clean Energy</div>
    <div class="card">∞ Scalable</div>
    <div class="card">24/7 Production</div>
  </div>
</section>

</body>
</html>
