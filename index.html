<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaVia</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0f1c;
  color:white;
}

/* HERO */
.hero {
  height:85vh;
  background: url('https://printzar1949-ui.github.io/aquavia-site/hero.jpg') center center / contain no-repeat;
  background-color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero-content {
  background:rgba(0,0,0,0.5);
  padding:30px 40px;
  border-radius:12px;
  max-width:600px;
}

/* باقي الأقسام */
.section {
  padding:60px 20px;
  text-align:center;
}

.grid {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.card {
  background:#11182a;
  padding:20px;
  border-radius:10px;
  min-width:200px;
}

.btn {
  padding:12px 25px;
  background:#00c2ff;
  color:black;
  text-decoration:none;
  border-radius:5px;
  display:inline-block;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1 style="font-size:48px;">أكوافيا</h1>
    <p style="font-size:20px;">تحويل الهواء إلى مياه شرب نظيفة</p>
    <p>من ابتكار <strong>نزار بشير جديد</strong></p>
    <a href="#contact" class="btn">كن مستثمراً</a>
  </div>
</section>

<!-- PROJECTS -->
<section class="section">
  <h2>المشاريع</h2>
  <p>نظام توليد المياه من الهواء</p>
  <p>حلول الطاقة النظيفة</p>
</section>

<!-- ROI -->
<section class="section">
  <h2>العائد على الاستثمار</h2>
  <div class="grid">
    <div class="card"><h3>$500</h3><p>تكلفة الوحدة</p></div>
    <div class="card"><h3>$2–$5/day</h3><p>الإيراد</p></div>
    <div class="card"><h3>6–12 شهر</h3><p>الاسترداد</p></div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>تواصل</h2>
  <p>printzar1949@gmail.com</p>
</section>

</body>
</html>
