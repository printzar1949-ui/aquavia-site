<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AquaVia Global Innovations</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#eef7fa;
color:#00334d;
overflow-x:hidden;
}

/* HERO SECTION */

.hero{
position:relative;
width:100%;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
background:#001f2e;
}

.hero img{
width:100%;
height:100vh;
object-fit:cover;
opacity:0.65;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

.content{
position:absolute;
z-index:2;
padding:20px;
max-width:800px;
}

.content h1{
font-size:58px;
color:white;
margin-bottom:15px;
text-shadow:0 3px 12px rgba(0,0,0,0.5);
}

.content p{
font-size:26px;
color:#dff9ff;
margin-bottom:35px;
text-shadow:0 2px 10px rgba(0,0,0,0.5);
}

/* BUTTON */

.btn{
display:inline-block;
padding:16px 32px;
background:#11c5dd;
color:white;
text-decoration:none;
border-radius:12px;
font-size:22px;
font-weight:bold;
transition:0.3s;
box-shadow:0 4px 14px rgba(0,0,0,0.25);
}

.btn:hover{
background:#00acc1;
transform:scale(1.05);
}

/* CONTACT */

.contact{
padding:70px 20px;
text-align:center;
background:white;
}

.contact h2{
font-size:40px;
margin-bottom:25px;
color:#00334d;
}

.email{
display:inline-block;
padding:18px 30px;
background:#eef7fa;
border-radius:14px;
font-size:26px;
font-weight:bold;
color:#00334d;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

/* FOOTER */

footer{
background:#00334d;
color:white;
text-align:center;
padding:25px;
font-size:22px;
}

/* MOBILE */

@media(max-width:768px){

.hero img{
height:75vh;
object-fit:contain;
background:#001f2e;
}

.content h1{
font-size:38px;
}

.content p{
font-size:20px;
}

.btn{
font-size:18px;
padding:14px 24px;
}

.contact h2{
font-size:30px;
}

.email{
font-size:18px;
padding:15px 20px;
}

footer{
font-size:18px;
}

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

<img src="hero.jpg" alt="AquaVia">

<div class="overlay"></div>

<div class="content">

<h1>AquaVia</h1>

<p>
Transforming Atmospheric Air Into Sustainable Water Solutions
</p>

<a class="btn" href="AquaVia_Pitch_Deck-1.pdf">
Download Pitch Deck
</a>

</div>

</section>

<!-- CONTACT -->

<section class="contact">

<h2>Contact</h2>

<div class="email">
📧 printzar1949@gmail.com
</div>

</section>

<!-- FOOTER -->

<footer>

💦🌏💦 AquaVia Global Innovations

</footer>

</body>
</html>
