<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكو فيا</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  background: #11182a;
  padding: 15px;
}

nav a {
  color: white;
  text-decoration: none;
}

.hero {
  position: relative;
}

.hero img {
  width: 100%;
  height: 60vh;
  object-fit: cover;
}

.overlay {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60vh;
  background: rgba(0,0,0,0.5);
}

.hero-text {
  position: absolute;
  top: 50%;
  width: 100%;
  transform: translateY(-50%);
  text-align: center;
}

section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: #11182a;
  padding: 20px;
  margin: 10px auto;
  border-radius: 10px;
  max-width: 600px;
}
</style>
</head>

<body>

<nav>
  <a href="#home">الرئيسية</a>
  <a href="#about">من نحن</a>
  <a href="#projects">المشاريع</a>
  <a href="#contact">تواصل</a>
</nav>

<section id="home" class="hero">
  <img src="https://raw.githubusercontent.com/printzar1949-ui/aquavia-site/main/hero.jpg">
  <div class="overlay"></div>

  <div class="hero-text">
    <h1>أكو فيا</h1>
    <p>المياه النقية من الهواء بتقنيات مبتكرة ومستدامة</p>
  </div>
</section>

<section id="about">
  <h2>من نحن</h2>
  <div class="card">
    مشروع أكوافيا يهدف إلى إنتاج مياه نظيفة من الهواء باستخدام الطاقة والتكثيف الذكي.
  </div>
</section>

<section id="projects">
  <h2>المشاريع</h2>
  <div class="card">نظام استخراج المياه من الهواء</div>
  <div class="card">حلول طاقة مستدامة</div>
</section>

<section id="contact">
  <h2>تواصل معنا</h2>
  <div class="card">
    example@aquavia.com
  </div>
</section>

</body>
</html>
