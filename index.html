<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AquaVia Global Innovations</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#001320,#002b45,#00111c);
    color:white;
    text-align:center;
}

/* القسم الرئيسي */

.hero{
    padding:80px 20px;
}

.hero h1{
    font-size:52px;
    color:#00d9ff;
    text-shadow:0 0 20px rgba(0,255,255,0.7);
}

.hero p{
    font-size:24px;
    margin-top:15px;
}

/* الصورة */

.hero-image{
    width:90%;
    max-width:950px;
    border-radius:24px;
    margin-top:35px;

    box-shadow:
    0 0 40px rgba(0,255,255,0.3),
    0 20px 60px rgba(0,0,0,0.6);

    animation:floatImage 5s ease-in-out infinite;
}

@keyframes floatImage{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* الأزرار */

.buttons{
    margin-top:40px;
}

.btn{
    display:inline-block;
    margin:12px;
    padding:14px 28px;
    border-radius:16px;

    background:#00cfe8;

    color:white;
    text-decoration:none;

    font-size:20px;

    box-shadow:
    0 0 25px rgba(0,255,255,0.4);

    transition:0.3s;
}

.btn:hover{
    transform:scale(1.08);
    background:#00e5ff;
}

/* قسم المخترع */

.inventor{
    width:85%;
    max-width:950px;

    margin:70px auto;

    padding:35px;

    background:rgba(255,255,255,0.05);

    border-radius:24px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 30px rgba(0,255,255,0.12);
}

.inventor h2{
    color:#00e5ff;
    font-size:36px;
}

.inventor p{
    font-size:22px;
    line-height:1.8;
}

/* التذييل */

footer{
    margin-top:80px;
    padding:25px;
    background:#000c14;
    font-size:18px;
}

</style>
</head>

<body>

<section class="hero">

<h1>أكوافيا للابتكارات العالمية</h1>

<p>
مستقبل المياه الجوية والتقنيات المستدامة
</p>

<img src="aquavia.jpg" alt="AquaVia" class="hero-image">

<div class="buttons">

<a href="#about" class="btn">
عن المشروع
</a>

<a href="#projects" class="btn">
المشاريع
</a>

<a href="https://github.com/printzar1949-ui/aquavia-site" target="_blank" class="btn">
💻 شفرة المصدر
</a>

</div>

</section>

<section class="inventor">

<h2>
مخترع ومطور ابتكارات
</h2>

<p>
نزار بشير جديد مخترع مستقل يركز على
التقنيات البيئية المستدامة وتقنيات المستقبل.
</p>

</section>

<footer>

Nezar Bachir Jdid © AquaVia Global Innovations

</footer>

</body>
</html>
